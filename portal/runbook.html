<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Corrective Action Runbook · Next-Gen IT</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,200..900,0..100;1,9..144,200..900,0..100&family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,600;1,400&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet"/>
<style>
:root {
  --paper:       #071A32;
  --paper-edge:  #041326;

  --ink:         #FFFFFF;
  --ink-soft:    #D7E2F0;
  --ink-muted:   #91A6C3;
  --rule:        rgba(145, 166, 195, 0.22);
  --rule-soft:   rgba(145, 166, 195, 0.12);

  --coral:       #FF6B5F;
  --coral-deep:  #E4473A;
  --coral-soft:  rgba(255, 107, 95, 0.14);
  --coral-glow:  rgba(255, 107, 95, 0.38);
  --sky:         #8FD7FF;
  --sky-soft:    rgba(143, 215, 255, 0.14);
  --sky-glow:    rgba(143, 215, 255, 0.28);

  --ok:          #22C55E;
  --ok-soft:     rgba(34, 197, 94, 0.12);
  --warn:        #F59E0B;
  --warn-soft:   rgba(245, 158, 11, 0.12);
  --danger:      #EF4444;
  --danger-soft: rgba(239, 68, 68, 0.12);

  --display: 'Fraunces', Georgia, serif;
  --body:    'IBM Plex Sans', sans-serif;
  --mono:    'IBM Plex Mono', monospace;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

body {
  background:
    radial-gradient(circle at 82% 12%, var(--coral-glow) 0%, transparent 28%),
    radial-gradient(circle at 14% 22%, var(--sky-glow)   0%, transparent 32%),
    linear-gradient(135deg, var(--paper-edge) 0%, var(--paper) 46%, #0B274D 100%);
  background-attachment: fixed;
  color: var(--ink);
  font-family: var(--body);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

body::before {
  content: "";
  position: fixed; inset: 0; pointer-events: none;
  background-image:
    linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);
  background-size: 64px 64px;
  mask-image: linear-gradient(to bottom,rgba(0,0,0,.5),transparent 70%);
  z-index: 0;
}

/* ── LOADING ─────────────────────────────────── */
.loading {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; min-height: 60vh; gap: 16px;
}
.spin {
  width: 40px; height: 40px;
  border: 2.5px solid var(--coral-soft); border-top-color: var(--coral);
  border-radius: 50%; animation: spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text {
  font-family: var(--mono); font-size: 12px;
  color: var(--ink-muted); letter-spacing: .1em; text-transform: uppercase;
}

.error-box {
  background: var(--danger-soft); border: 1px solid rgba(239,68,68,.35);
  border-radius: 18px; padding: 32px; text-align: center;
  margin: 60px auto; max-width: 480px;
}
.error-box h2 { color: var(--danger); font-family: var(--display); margin-bottom: 10px; font-size: 18px; }
.error-box p  { color: var(--ink-muted); font-size: 13px; line-height: 1.6; }

/* ── LAYOUT ──────────────────────────────────── */
.wrap { max-width: 1100px; margin: 0 auto; padding: 28px 24px; position: relative; z-index: 1; }

/* ── REPORT HEADER ───────────────────────────── */
.hdr {
  background:
    linear-gradient(135deg, var(--coral-soft) 0%, transparent 40%),
    linear-gradient(220deg, var(--sky-soft)   0%, transparent 50%),
    rgba(10, 35, 66, 0.82);
  border: 1px solid var(--rule); border-radius: 22px;
  padding: 28px 32px; margin-bottom: 24px;
  position: relative; overflow: hidden;
  box-shadow: 0 22px 70px rgba(0,0,0,.34);
}
.hdr::before {
  content: "";
  position: absolute; inset: 0 0 auto 0; height: 3px;
  background: linear-gradient(90deg, var(--coral), var(--sky));
}

.ey {
  display: inline-flex; align-items: center; gap: .6rem;
  font-family: var(--mono); font-size: .7rem;
  letter-spacing: .14em; text-transform: uppercase;
  color: var(--coral); margin-bottom: 10px; margin-top: 3px;
}
.ey::before {
  content: "";
  width: 28px; height: 1.5px;
  background: linear-gradient(90deg, var(--coral), var(--sky));
  border-radius: 99px;
}

.hdr h1 {
  font-family: var(--display);
  font-size: clamp(1.8rem, 4vw, 3rem);
  font-weight: 800; line-height: 1.05; letter-spacing: -.03em;
  color: var(--ink); margin-bottom: 6px;
}
.hdr h1 em { color: var(--coral); font-style: italic; font-weight: 400; }

.hdr p { color: var(--ink-soft); margin-top: 8px; line-height: 1.6; font-size: 13.5px; }

.hmeta {
  display: flex; gap: 20px; flex-wrap: wrap;
  margin-top: 12px; font-family: var(--mono);
  font-size: 12px; color: var(--ink-muted);
}

.hactions { display: flex; gap: 10px; margin-top: 18px; flex-wrap: wrap; }

.hbtn {
  display: inline-flex; align-items: center; gap: 6px;
  border-radius: 999px; font-family: var(--body); font-size: .8rem;
  font-weight: 700; padding: 9px 18px; cursor: pointer;
  border: 1px solid transparent; text-decoration: none;
  transition: filter .15s, transform .12s;
}
.hbtn-primary {
  background: linear-gradient(135deg, var(--coral), var(--coral-deep));
  color: #fff; box-shadow: 0 8px 22px rgba(228,71,58,.22);
}
.hbtn-primary:hover { filter: brightness(1.06); transform: translateY(-1px); color: #fff; }
.hbtn-ghost {
  background: transparent; border-color: rgba(255,107,95,.45); color: var(--coral);
}
.hbtn-ghost:hover { background: var(--coral-soft); }
.hbtn-blue {
  background: transparent; border-color: rgba(143,215,255,.4); color: var(--sky);
}
.hbtn-blue:hover { background: var(--sky-soft); color: var(--sky); }

/* ── STATS ROW ───────────────────────────────── */
.srow {
  display: grid; grid-template-columns: repeat(3,1fr);
  gap: 12px; margin-bottom: 20px;
}
.stat {
  background: rgba(10,35,66,.74);
  border: 1px solid var(--rule); border-radius: 14px;
  padding: 14px 16px; position: relative; overflow: hidden;
}
.stat::before {
  content: "";
  position: absolute; inset: 0 0 auto 0; height: 2px;
  background: linear-gradient(90deg, var(--coral), transparent);
}
.sv {
  font-family: var(--display); font-size: 26px;
  font-weight: 800; line-height: 1; margin-bottom: 4px;
}
.sl {
  font-family: var(--mono); font-size: .68rem;
  color: var(--ink-muted); letter-spacing: .1em; text-transform: uppercase;
  margin-top: 3px;
}

/* ── CONTENT LAYOUT ──────────────────────────── */
.layout {
  display: grid;
  grid-template-columns: 260px 1fr;
  gap: 20px; align-items: start;
}

/* ── TOC ─────────────────────────────────────── */
.toc {
  position: sticky; top: 20px;
  background: rgba(10,35,66,.82);
  border: 1px solid var(--rule); border-radius: 18px;
  padding: 16px; overflow: hidden;
  position: relative;
}
.toc::before {
  content: "";
  position: absolute; inset: 0 0 auto 0; height: 3px;
  background: linear-gradient(90deg, var(--coral), var(--sky));
}
.toc-lbl {
  display: block; font-family: var(--mono); font-size: .68rem;
  letter-spacing: .12em; text-transform: uppercase;
  color: var(--coral); margin-bottom: 12px; margin-top: 3px;
}
.toc a {
  display: block; padding: 8px 12px; border-radius: 10px;
  color: var(--ink-soft); font-size: 13px; text-decoration: none;
  transition: background .15s, color .15s;
}
.toc a:hover { background: var(--coral-soft); color: var(--coral); }

.toc-section { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--rule-soft); }
.toc-section-lbl {
  display: block; font-family: var(--mono); font-size: .65rem;
  letter-spacing: .1em; text-transform: uppercase;
  color: var(--ink-muted); padding: 0 12px; margin-bottom: 6px;
}

/* ── WIRE FRAUD ──────────────────────────────── */
.wire-box {
  background: var(--danger-soft);
  border: 1px solid rgba(239,68,68,.38);
  border-left: 4px solid var(--danger);
  border-radius: 18px; padding: 20px 24px; margin-bottom: 20px;
}
.wt {
  font-family: var(--display); color: var(--danger);
  font-weight: 800; font-size: 15px; margin-bottom: 10px;
}
.wstats { display: flex; gap: 24px; margin-bottom: 12px; flex-wrap: wrap; }
.wv { font-family: var(--display); font-size: 22px; font-weight: 800; color: var(--danger); }
.wl { font-family: var(--mono); font-size: 9px; color: var(--ink-muted); letter-spacing: .06em; }
.wire-box p { font-size: 13px; color: var(--ink-soft); line-height: 1.6; }
.wire-box code {
  font-family: var(--mono); color: var(--coral);
  background: var(--coral-soft); border-radius: 4px; padding: 1px 6px; font-size: 12px;
}

/* ── FINDINGS TABLE ──────────────────────────── */
.sec {
  background: rgba(10,35,66,.74);
  border: 1px solid var(--rule); border-radius: 18px;
  margin-bottom: 20px; overflow: hidden;
  position: relative;
}
.sec::before {
  content: "";
  position: absolute; inset: 0 0 auto 0; height: 3px;
  background: linear-gradient(90deg, var(--coral), var(--sky));
}
.sec-hdr {
  padding: 14px 22px; border-bottom: 1px solid var(--rule-soft);
  font-family: var(--mono); font-size: .7rem;
  letter-spacing: .1em; text-transform: uppercase; color: var(--coral);
  margin-top: 3px;
}

table { width: 100%; border-collapse: collapse; }
th {
  padding: 10px 14px; font-family: var(--mono); font-size: .66rem;
  letter-spacing: .1em; text-transform: uppercase;
  color: var(--ink-muted); border-bottom: 1px solid var(--rule);
  text-align: left; font-weight: 500;
}
td {
  padding: 10px 14px; border-bottom: 1px solid var(--rule-soft);
  font-size: 12px; color: var(--ink-soft); vertical-align: top;
}
tr:last-child td { border-bottom: none; }

/* ── STEP CARDS ──────────────────────────────── */
.step-card {
  background: rgba(10,35,66,.74);
  border: 1px solid var(--rule); border-radius: 22px;
  margin-bottom: 20px; overflow: hidden;
  scroll-margin-top: 24px; position: relative;
}
.step-card::before {
  content: "";
  position: absolute; inset: 0 0 auto 0; height: 3px;
  background: linear-gradient(90deg, var(--coral), var(--sky));
}

.step-hdr {
  background: rgba(4,19,38,.45);
  border-bottom: 1px solid var(--rule-soft);
  padding: 16px 22px; display: flex; align-items: center; gap: 14px;
  margin-top: 3px;
}
.step-num {
  width: 40px; height: 40px; border-radius: 12px;
  background: linear-gradient(135deg, var(--coral), var(--coral-deep));
  display: flex; align-items: center; justify-content: center;
  font-family: var(--display); font-weight: 900; font-size: 15px;
  color: #fff; flex-shrink: 0;
  box-shadow: 0 6px 18px rgba(228,71,58,.28);
}
.step-title-wrap { flex: 1; }
.step-title {
  font-family: var(--display); font-size: 16px; font-weight: 700;
  color: var(--ink); letter-spacing: -.01em;
}
.step-prio {
  font-family: var(--mono); font-size: .68rem; font-weight: 700;
  letter-spacing: .08em; text-transform: uppercase; margin-top: 4px;
}
.prio-high { color: var(--danger); }
.prio-med  { color: var(--warn); }
.prio-low  { color: var(--ok); }

.step-body { padding: 20px 22px; }
.step-body p { color: var(--ink-soft); line-height: 1.7; margin-bottom: 14px; font-size: 13.5px; }
.code-lbl {
  display: block; font-family: var(--mono); font-size: .68rem;
  letter-spacing: .1em; text-transform: uppercase;
  color: var(--ink-muted); margin-bottom: 6px;
}
.step-code {
  background: rgba(4,19,38,.78);
  border: 1px solid var(--rule);
  border-left: 3px solid var(--coral);
  border-radius: 0 12px 12px 0;
  padding: 14px 16px; overflow-x: auto;
  font-family: var(--mono); font-size: 12px;
  color: var(--sky); line-height: 1.6;
  white-space: pre-wrap; word-break: break-all; margin-bottom: 14px;
}
.check-wrap {
  border: 1px solid var(--rule); border-radius: 12px;
  padding: 12px 16px; background: rgba(4,19,38,.45);
}
.check-wrap label {
  display: flex; align-items: flex-start; gap: 12px;
  cursor: pointer; color: var(--ink-soft); font-size: 13px;
}
.check-wrap input[type=checkbox] {
  margin-top: 2px; accent-color: var(--coral);
  width: 16px; height: 16px; flex-shrink: 0;
}

/* ── FOOTER ──────────────────────────────────── */
.footer {
  text-align: center; padding: 24px;
  font-family: var(--mono); font-size: 12px;
  color: var(--ink-muted); border-top: 1px solid var(--rule);
  margin-top: 24px;
}
.footer a { color: var(--coral); text-decoration: none; }
.footer a:hover { color: var(--sky); }

/* ── TOAST ───────────────────────────────────── */
.toast {
  position: fixed; bottom: 20px; left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: rgba(13,43,79,.96); border: 1px solid var(--rule);
  border-radius: 999px; padding: 9px 18px;
  font-family: var(--mono); font-size: 12px; color: var(--ok);
  opacity: 0; transition: all .2s; pointer-events: none;
  backdrop-filter: blur(12px); white-space: nowrap;
}
.toast.on { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── RESPONSIVE ──────────────────────────────── */
@media (max-width: 800px) {
  .layout { grid-template-columns: 1fr; }
  .toc { position: static; }
  .srow { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 600px) {
  .srow { grid-template-columns: 1fr; }
  .hactions { flex-direction: column; align-items: stretch; }
}

/* ── PRINT ───────────────────────────────────── */
@media print {
  body { background: #fff; color: #000; }
  body::before { display: none; }
  .toc, .hactions { display: none !important; }
  .layout { grid-template-columns: 1fr !important; }
  .hdr, .step-card, .wire-box, .sec, .stat {
    background: #fff !important;
    border-color: #ddd !important;
    box-shadow: none !important;
  }
  .hdr::before, .step-card::before, .sec::before, .stat::before { display: none; }
  .hdr h1, .step-title, .sv { color: #000 !important; }
  .hdr h1 em { color: #C94035 !important; }
  .hdr p, .step-body p, .wl, .sl { color: #444 !important; }
  .ey, .toc-lbl, .sec-hdr, .reports-label, .code-lbl { color: #C94035 !important; }
  .step-code { background: #f8f8f8 !important; color: #1e40af !important; border-color: #ddd !important; }
  .step-num { background: #C94035 !important; box-shadow: none !important; }
  th { color: #666 !important; border-color: #eee !important; }
  td { color: #444 !important; border-color: #f1f1f1 !important; }
  .wire-box { background: #fff5f5 !important; border-color: #fca5a5 !important; }
  .wt { color: #dc2626 !important; }
  .wv { color: #dc2626 !important; }
}
</style>
</head>
<body>

<div id="root">
  <div class="loading">
    <div class="spin"></div>
    <div class="loading-text">Loading runbook…</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function gradeColor(t,m){const p=t/m;return p>=.8?'var(--ok)':p>=.65?'#86efac':p>=.5?'var(--warn)':p>=.35?'#fb923c':'var(--danger)';}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),2200);}
function copyLink(){navigator.clipboard.writeText(location.href).then(()=>toast('🔗 Link copied!')).catch(()=>{const ta=document.createElement('textarea');ta.value=location.href;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('🔗 Copied!');});}

function render(d) {
  const scanDate = d.ts ? new Date(d.ts).toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'}) : new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
  const failed = (d.findings||[]).filter(f => f.status === 'fail' || f.status === 'warn');
  const remed  = (d.remediation||[]);

  document.title = `Runbook — ${d.domain} · Next-Gen IT`;

  const toc = remed.map(r =>
    `<a href="#step-${r.n}">${r.n}. ${esc(r.title)}</a>`
  ).join('');

  const steps = remed.map(r => {
    const pc = r.p==='high'?'prio-high':r.p==='med'?'prio-med':'prio-low';
    const pt = r.p==='high'?'HIGH PRIORITY':r.p==='med'?'MEDIUM PRIORITY':'LOW PRIORITY';
    return `
    <div class="step-card" id="step-${r.n}">
      <div class="step-hdr">
        <div class="step-num">${r.n}</div>
        <div class="step-title-wrap">
          <div class="step-title">${esc(r.title)}</div>
          <div class="step-prio ${pc}">${pt}</div>
        </div>
      </div>
      <div class="step-body">
        <p>${esc(r.desc)}</p>
        ${r.code ? `<span class="code-lbl">→ DNS Record / Command</span><pre class="step-code">${esc(r.code)}</pre>` : ''}
        <div class="check-wrap">
          <label>
            <input type="checkbox">
            <span>Mark complete — verify change is live in DNS / browser before moving to the next step</span>
          </label>
        </div>
      </div>
    </div>`;
  }).join('');

  const failRows = failed.map(f => {
    const tag = f.status==='fail'?'tag-fail':'tag-warn';
    return `<tr>
      <td style="font-weight:600;color:var(--ink)">${esc(f.check)}</td>
      <td><span style="font-family:var(--mono);font-size:.66rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:3px 9px;border-radius:999px;display:inline-flex;align-items:center" class="${tag}">${(f.status||'').toUpperCase()}</span></td>
      <td style="font-family:var(--mono);font-size:11px">${esc(f.value)}</td>
      <td>${esc(f.risk)}</td>
    </tr>`;
  }).join('');

  document.getElementById('root').innerHTML = `
  <div class="wrap">

    <div class="hdr">
      <span class="ey">Next-Gen IT · Corrective Action Runbook</span>
      <h1><em>${esc(d.domain)}</em> — fix the audit findings.</h1>
      <p>Step-by-step instructions for every failed or at-risk item from the domain health audit. Work through each step in order — HIGH priority items first.</p>
      <div class="hmeta">
        <span>📅 Scan date: ${scanDate}</span>
        <span>🏢 ${esc(d.domain)}</span>
        <span>⚠️ ${remed.length} item${remed.length!==1?'s':''} to fix</span>
      </div>
      <div class="hactions">
        <button class="hbtn hbtn-primary" onclick="window.print()">🖨️ Print / Save PDF</button>
        <button class="hbtn hbtn-ghost" onclick="copyLink()">🔗 Copy Link</button>
        <a class="hbtn hbtn-blue" href="${location.href.replace('runbook.html','report.html')}" target="_blank">📊 View Exec Report</a>
      </div>
    </div>

    <div class="srow">
      <div class="stat"><div class="sv" style="color:${gradeColor((d.scores||{}).email||0,10)}">${(d.scores||{}).email||0}/10</div><div class="sl">Email Auth</div></div>
      <div class="stat"><div class="sv" style="color:${gradeColor((d.scores||{}).web||0,10)}">${(d.scores||{}).web||0}/10</div><div class="sl">Website / SEO</div></div>
      <div class="stat"><div class="sv" style="color:${gradeColor((d.scores||{}).tech||0,10)}">${(d.scores||{}).tech||0}/10</div><div class="sl">Tech Stack</div></div>
    </div>

    ${d.wireRisk ? `
    <div class="wire-box">
      <div class="wt">⚠️ Wire Fraud Risk — Fix DMARC Before Anything Else</div>
      <div class="wstats">
        <div><div class="wv">$275M</div><div class="wl">RE Fraud (2024)</div></div>
        <div><div class="wv">12,368</div><div class="wl">IC3 Complaints</div></div>
        <div><div class="wv">$3.04B</div><div class="wl">BEC Losses</div></div>
      </div>
      <p>DMARC is missing or set to <code>p=none</code> on <strong>${esc(d.domain)}</strong>. Until DMARC and SPF are hardened, this domain can be spoofed to send fraudulent wire instructions. Start with the SPF and DMARC steps below.</p>
    </div>` : ''}

    <div class="layout">

      <div class="toc">
        <span class="toc-lbl">Steps in this runbook</span>
        ${toc || '<p style="color:var(--ink-muted);font-size:13px;padding:4px 12px">No corrective actions needed.</p>'}
        ${failed.length ? `<div class="toc-section"><span class="toc-section-lbl">Quick links</span><a href="#findings-table">Failed items table</a></div>` : ''}
      </div>

      <div>
        ${remed.length ? steps : '<div style="background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.3);border-radius:18px;padding:32px;text-align:center;color:var(--ok);font-weight:600;font-family:var(--display);font-size:1.2rem">✓ All checks passed — no corrective actions required.</div>'}

        ${failed.length ? `
        <div class="sec" id="findings-table">
          <div class="sec-hdr">All Failed / At-Risk Findings</div>
          <table>
            <thead><tr><th>Check</th><th>Status</th><th>Value</th><th>Risk</th></tr></thead>
            <tbody>${failRows}</tbody>
          </table>
        </div>` : ''}
      </div>

    </div>

    <div class="footer">
      Generated by <a href="https://jeremiah9980.github.io/Next-Gen-IT/portal/">Next-Gen IT</a> · ${esc(d.domain)} · ${scanDate}
    </div>

  </div>`;
}

(function init() {
  const hash = location.hash;
  if (!hash || !hash.startsWith('#data=')) {
    document.getElementById('root').innerHTML = `<div class="wrap"><div class="error-box"><h2>No runbook data</h2><p>This link is missing audit data. Generate a report from the <a href="./index.html" style="color:var(--coral)">Next-Gen IT Portal</a> and use the Share Runbook button.</p></div></div>`;
    return;
  }
  try {
    const json = decodeURIComponent(escape(atob(hash.slice(6))));
    const d = JSON.parse(json);
    render(d);
  } catch(e) {
    document.getElementById('root').innerHTML = `<div class="wrap"><div class="error-box"><h2>Invalid runbook data</h2><p>The runbook data in this URL could not be decoded. Try regenerating from the portal.</p><p style="margin-top:8px;font-family:var(--mono);font-size:10px;color:var(--ink-muted)">${e.message}</p></div></div>`;
  }
})();
</script>
</body>
</html>
