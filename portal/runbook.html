<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Corrective Action Runbook · Next-Gen IT</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f8fafc;color:#334155;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:14px;line-height:1.5}

/* LOADING */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px}
.spin{width:40px;height:40px;border:3px solid #e2e8f0;border-top-color:#e55b4d;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:12px;color:#94a3b8;letter-spacing:.1em;text-transform:uppercase;font-family:monospace}
.error-box{background:#fff;border:1px solid #fecaca;border-radius:16px;padding:32px;text-align:center;margin:60px auto;max-width:480px}
.error-box h2{color:#dc2626;margin-bottom:10px;font-size:18px}
.error-box p{color:#64748b;font-size:13px;line-height:1.6}

/* LAYOUT */
.wrap{max-width:1100px;margin:0 auto;padding:28px 20px}
.hdr{background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:28px 32px;margin-bottom:24px}
.ey{font-family:monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#e55b4d;display:block;margin-bottom:8px}
.hdr h1{font-size:clamp(20px,3vw,26px);font-weight:800;color:#0f172a;margin-bottom:6px}
.hdr h1 em{color:#e55b4d;font-style:normal}
.hdr p{color:#64748b;margin-top:8px;line-height:1.6}
.hmeta{display:flex;gap:20px;flex-wrap:wrap;margin-top:12px;font-size:12px;color:#94a3b8}
.hactions{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
.hbtn{border-radius:8px;font-family:monospace;font-size:11px;padding:7px 14px;cursor:pointer;border:1px solid;text-decoration:none;transition:all .15s;display:inline-block}
.hbtn-primary{background:#e55b4d;border-color:#e55b4d;color:#fff}.hbtn-primary:hover{background:#c94035}
.hbtn-ghost{background:transparent;border-color:#e55b4d;color:#e55b4d}.hbtn-ghost:hover{background:#fef2f2}
.hbtn-blue{background:transparent;border-color:#3b82f6;color:#3b82f6}.hbtn-blue:hover{background:#eff6ff}

.srow{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.stat{background:#fff;border:1px solid #e2e8f0;border-radius:14px;padding:14px 16px}
.sv{font-size:26px;font-weight:800;color:#0f172a;font-family:monospace}
.sl{font-size:11px;color:#94a3b8;letter-spacing:.06em;text-transform:uppercase;margin-top:3px}

.layout{display:grid;grid-template-columns:260px 1fr;gap:20px;align-items:start}
.toc{position:sticky;top:20px;background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:16px}
.toc-lbl{font-family:monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:#e55b4d;margin-bottom:12px;display:block}
.toc a{display:block;padding:8px 12px;border-radius:10px;color:#334155;font-size:13px;text-decoration:none;transition:background .15s}
.toc a:hover{background:#f1f5f9;color:#e55b4d}
.toc-section{margin-top:12px;padding-top:12px;border-top:1px solid #e2e8f0}
.toc-section-lbl{font-family:monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#94a3b8;padding:0 12px;margin-bottom:6px;display:block}

.wire-box{background:#fef2f2;border:1px solid #fecaca;border-radius:14px;padding:20px 24px;margin-bottom:20px}
.wt{color:#dc2626;font-weight:700;font-size:15px;margin-bottom:10px}
.wstats{display:flex;gap:24px;margin-bottom:12px;flex-wrap:wrap}
.wv{font-size:22px;font-weight:900;color:#dc2626;font-family:monospace}
.wl{font-size:10px;color:#94a3b8;letter-spacing:.06em}
.wire-box p{font-size:13px;color:#64748b;line-height:1.6}
.wire-box code{background:#fee2e2;color:#dc2626;border-radius:4px;padding:1px 6px;font-family:monospace;font-size:12px}

.sec{background:#fff;border:1px solid #e2e8f0;border-radius:16px;margin-bottom:20px;overflow:hidden}
.sec-hdr{padding:14px 22px;border-bottom:1px solid #f1f5f9;font-family:monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#94a3b8}
table{width:100%;border-collapse:collapse}
th{padding:10px 14px;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:#94a3b8;border-bottom:1px solid #f1f5f9;text-align:left;font-weight:500}
td{padding:10px 14px;border-bottom:1px solid #f8fafc;font-size:12px;color:#475569;vertical-align:top}
tr:last-child td{border-bottom:none}

/* STEP CARDS */
.step-card{border:1px solid #e2e8f0;border-radius:20px;background:#fff;margin-bottom:20px;overflow:hidden;scroll-margin-top:24px}
.step-hdr{background:#f8fafc;border-bottom:1px solid #e2e8f0;padding:16px 22px;display:flex;align-items:center;gap:14px}
.step-num{width:38px;height:38px;border-radius:12px;background:linear-gradient(135deg,#e55b4d,#c94035);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:15px;color:#fff;flex-shrink:0}
.step-title-wrap{flex:1}
.step-title{font-size:16px;font-weight:700;color:#0f172a}
.step-prio{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-top:3px}
.prio-high{color:#dc2626}.prio-med{color:#d97706}.prio-low{color:#16a34a}
.step-body{padding:20px 22px}
.step-body p{color:#475569;line-height:1.7;margin-bottom:14px}
.code-lbl{font-family:monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#64748b;margin-bottom:6px;display:block}
.step-code{background:#f8fafc;border:1px solid #e2e8f0;border-left:3px solid #e55b4d;border-radius:0 10px 10px 0;padding:14px 16px;overflow-x:auto;font-family:monospace;font-size:12px;color:#334155;line-height:1.6;white-space:pre-wrap;word-break:break-all;margin-bottom:14px}
.check-wrap{border:1px solid #e2e8f0;border-radius:12px;padding:12px 16px;background:#f8fafc}
.check-wrap label{display:flex;align-items:flex-start;gap:12px;cursor:pointer;color:#475569;font-size:13px}
.check-wrap input[type=checkbox]{margin-top:2px;accent-color:#e55b4d;width:16px;height:16px;flex-shrink:0}

.footer{text-align:center;padding:24px;font-size:12px;color:#94a3b8;border-top:1px solid #e2e8f0;margin-top:24px}
.footer a{color:#e55b4d;text-decoration:none}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(10px);background:#0f172a;border:1px solid rgba(229,91,77,.4);border-radius:8px;padding:8px 16px;font-size:12px;color:#10b981;opacity:0;transition:all .2s;pointer-events:none;white-space:nowrap}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

@media print{.toc,.hactions{display:none!important}.layout{grid-template-columns:1fr!important}}
@media(max-width:800px){.layout{grid-template-columns:1fr}.toc{position:static}.srow{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<div id="root">
  <div class="loading">
    <div class="spin"></div>
    <div class="loading-text">Loading runbook…</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function gradeColor(t,m){const p=t/m;return p>=.8?'#16a34a':p>=.65?'#65a30d':p>=.5?'#d97706':p>=.35?'#ea580c':'#dc2626';}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),2200);}
function copyLink(){navigator.clipboard.writeText(location.href).then(()=>toast('🔗 Link copied!')).catch(()=>{const ta=document.createElement('textarea');ta.value=location.href;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('🔗 Copied!');});}

function render(d) {
  const scanDate = d.ts ? new Date(d.ts).toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'}) : new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
  const failed = (d.findings||[]).filter(f => f.status === 'fail' || f.status === 'warn');
  const remed  = (d.remediation||[]);

  document.title = `Runbook — ${d.domain} · Next-Gen IT`;

  // TOC
  const toc = remed.map(r =>
    `<a href="#step-${r.n}">${r.n}. ${esc(r.title)}</a>`
  ).join('');

  // Step cards
  const steps = remed.map(r => {
    const pc = r.p==='high'?'prio-high':r.p==='med'?'prio-med':'prio-low';
    const pt = r.p==='high'?'HIGH PRIORITY':r.p==='med'?'MEDIUM PRIORITY':'LOW PRIORITY';
    return `
    <div class="step-card" id="step-${r.n}">
      <div class="step-hdr">
        <div class="step-num">${r.n}</div>
        <div class="step-title-wrap">
          <div class="step-title">${esc(r.title)}</div>
          <div class="step-prio ${pc}">${pt}</div>
        </div>
      </div>
      <div class="step-body">
        <p>${esc(r.desc)}</p>
        ${r.code ? `<span class="code-lbl">→ DNS Record / Command</span><pre class="step-code">${esc(r.code)}</pre>` : ''}
        <div class="check-wrap">
          <label>
            <input type="checkbox">
            <span>Mark complete — verify change is live in DNS / browser before moving to next step</span>
          </label>
        </div>
      </div>
    </div>`;
  }).join('');

  // Failed table
  const failRows = failed.map(f => {
    const c = f.status==='fail'?'#dc2626':'#d97706';
    const bg = f.status==='fail'?'#fef2f2':'#fffbeb';
    return `<tr>
      <td style="font-weight:600;color:#0f172a">${esc(f.check)}</td>
      <td><span style="font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:3px 8px;border-radius:4px;background:${bg};color:${c}">${(f.status||'').toUpperCase()}</span></td>
      <td style="font-family:monospace;font-size:11px">${esc(f.value)}</td>
      <td>${esc(f.risk)}</td>
    </tr>`;
  }).join('');

  document.getElementById('root').innerHTML = `
  <div class="wrap">

    <div class="hdr">
      <span class="ey">Next-Gen IT · Corrective Action Runbook</span>
      <h1><em>${esc(d.domain)}</em> — fix the audit findings.</h1>
      <p>Step-by-step instructions for every failed or at-risk item from the domain health audit. Work through each step in order — HIGH priority items first.</p>
      <div class="hmeta">
        <span>📅 Scan date: ${scanDate}</span>
        <span>🏢 ${esc(d.domain)}</span>
        <span>⚠️ ${remed.length} item${remed.length!==1?'s':''} to fix</span>
      </div>
      <div class="hactions">
        <button class="hbtn hbtn-primary" onclick="window.print()">🖨️ Print / Save PDF</button>
        <button class="hbtn hbtn-ghost" onclick="copyLink()">🔗 Copy Link</button>
        <a class="hbtn hbtn-blue" href="${location.href.replace('runbook.html','report.html')}" target="_blank">📊 View Exec Report</a>
      </div>
    </div>

    <div class="srow">
      <div class="stat"><div class="sv" style="color:${gradeColor((d.scores||{}).email||0,10)}">${(d.scores||{}).email||0}/10</div><div class="sl">Email Auth</div></div>
      <div class="stat"><div class="sv" style="color:${gradeColor((d.scores||{}).web||0,10)}">${(d.scores||{}).web||0}/10</div><div class="sl">Website / SEO</div></div>
      <div class="stat"><div class="sv" style="color:${gradeColor((d.scores||{}).tech||0,10)}">${(d.scores||{}).tech||0}/10</div><div class="sl">Tech Stack</div></div>
    </div>

    ${d.wireRisk ? `
    <div class="wire-box">
      <div class="wt">⚠️ Wire Fraud Risk — Fix DMARC Before Anything Else</div>
      <div class="wstats">
        <div><div class="wv">$275M</div><div class="wl">RE Fraud (2024)</div></div>
        <div><div class="wv">12,368</div><div class="wl">IC3 Complaints</div></div>
        <div><div class="wv">$3.04B</div><div class="wl">BEC Losses</div></div>
      </div>
      <p>DMARC is missing or set to <code>p=none</code> on <strong>${esc(d.domain)}</strong>. Until DMARC and SPF are hardened, this domain can be spoofed to send fraudulent wire instructions. Start with the SPF and DMARC steps below.</p>
    </div>` : ''}

    <div class="layout">

      <div class="toc">
        <span class="toc-lbl">Steps in this runbook</span>
        ${toc || '<p style="color:#94a3b8;font-size:13px;padding:4px 12px">No corrective actions needed.</p>'}
        ${failed.length ? `<div class="toc-section"><span class="toc-section-lbl">Quick links</span><a href="#findings-table">Failed items table</a></div>` : ''}
      </div>

      <div>
        ${remed.length ? steps : '<div style="background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:32px;text-align:center;color:#16a34a;font-weight:600">✓ All checks passed — no corrective actions required.</div>'}

        ${failed.length ? `
        <div class="sec" id="findings-table">
          <div class="sec-hdr">All Failed / At-Risk Findings</div>
          <table>
            <thead><tr>
              <th>Check</th><th>Status</th><th>Value</th><th>Risk</th>
            </tr></thead>
            <tbody>${failRows}</tbody>
          </table>
        </div>` : ''}
      </div>

    </div>

    <div class="footer">
      Generated by <a href="https://jeremiah9980.github.io/Next-Gen-IT/portal/">Next-Gen IT</a> · ${esc(d.domain)} · ${scanDate}
    </div>

  </div>`;
}

// Decode from URL hash
(function init() {
  const hash = location.hash;
  if (!hash || !hash.startsWith('#data=')) {
    document.getElementById('root').innerHTML = `<div class="wrap"><div class="error-box"><h2>No runbook data</h2><p>This link is missing audit data. Generate a report from the <a href="./index.html" style="color:#e55b4d">Next-Gen IT Portal</a> and use the Share Runbook button.</p></div></div>`;
    return;
  }
  try {
    const json = decodeURIComponent(escape(atob(hash.slice(6))));
    const d = JSON.parse(json);
    render(d);
  } catch(e) {
    document.getElementById('root').innerHTML = `<div class="wrap"><div class="error-box"><h2>Invalid runbook data</h2><p>The runbook data in this URL could not be decoded. Try regenerating from the portal.</p><p style="margin-top:8px;font-family:monospace;font-size:10px;color:#94a3b8">${e.message}</p></div></div>`;
  }
})();
</script>
</body>
</html>
