version: "3.9"

services:
  backend:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./backend:/app
    command: >
      sh -c "pip install -r requirements.txt &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"

  frontend:
    image: python:3.12-slim
    working_dir: /site
    volumes:
      - ./frontend:/site
    command: python -m http.server 4173 --bind 0.0.0.0
    ports:
      - "4173:4173"
